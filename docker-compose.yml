services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: gussi-is:local
    ports:
      - "${HTTP_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
