services:
  web:
    image: ghcr.io/gussi/gussi.is:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gussi-is.rule=${HOST_RULE:-Host(`gussi.is`) || Host(`www.gussi.is`) || Host(`gussi.dev`) || Host(`www.gussi.dev`)}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  traefik:
    external: true
